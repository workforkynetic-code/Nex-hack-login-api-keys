<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX-HACK DATABASE SYSTEM</title>
    <style>
        body {
            background-color: #05000a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: #0d021a;
            padding: 30px;
            border-radius: 4px;
            border: 2px solid #00ff66;
            box-shadow: 0px 0px 20px rgba(0, 255, 102, 0.2);
        }
        h2 { 
            margin-bottom: 5px; 
            color: #ff0055; 
            text-shadow: 0 0 10px #ff0055;
            font-size: 24px;
        }
        .sub-title {
            color: #00ffff;
            font-size: 13px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .key-box {
            background: #000000;
            padding: 18px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 3px;
            border-radius: 4px;
            border: 1px solid #00ffff;
            margin: 25px 0;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
        }
        button {
            background: #ff0055;
            color: #ffffff;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 10px #ff0055;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover { 
            background: #00ff66; 
            color: #000;
            box-shadow: 0 0 15px #00ff66;
        }
        .ad-space {
            margin: 20px auto;
            min-height: 90px;
            background: rgba(0, 255, 102, 0.03);
            border: 1px dashed rgba(0, 255, 10 green2, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: #444;
        }
        .status-text {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="ad-space">
        [SYSTEM_AD_NET_TOP_BANNER]
    </div>

    <div class="container">
        <h2>BYPASS INJECTOR v2.0</h2>
        <div class="sub-title">Status: External Server Connected</div>
        
        <p style="color: #aaa; font-size: 14px;">Your generated terminal key is ready for database injection:</p>
        
        <div class="key-box" id="keyDisplay">GENERATING CODE...</div>
        
        <button onclick="copyKey()">Inject & Copy Key</button>
        
        <div class="status-text" id="statusMessage">Connecting to cloud system...</div>
    </div>

    <div class="ad-space">
        [SYSTEM_AD_NET_BOTTOM_BANNER]
    </div>

    <script>
        let generatedKey = "";

        // Backend se key generate karne ka function
        async function fetchKey() {
            try {
                document.getElementById('keyDisplay').innerText = "FETCHING DB...";
                let response = await fetch('/api/generate');
                let data = await response.json();
                
                if(data.key) {
                    generatedKey = data.key;
                    document.getElementById('keyDisplay').innerText = generatedKey;
                    document.getElementById('statusMessage').innerText = "SUCCESS: Key injected to Firebase!";
                    document.getElementById('statusMessage').style.color = "#00ff66";
                } else {
                    document.getElementById('keyDisplay').innerText = "ERROR x01";
                    document.getElementById('statusMessage').innerText = "FAILED: " + (data.error || "Unknown Error");
                    document.getElementById('statusMessage').style.color = "#ff0055";
                }
            } catch (err) {
                document.getElementById('keyDisplay').innerText = "OFFLINE Error";
                document.getElementById('statusMessage').innerText = "CRITICAL: Backend Server Not Responding.";
                document.getElementById('statusMessage').style.color = "#ff0055";
            }
        }

        // Copy Karne Ka Functional Block
        function copyKey() {
            if(generatedKey === "" || generatedKey.includes("...")) {
                alert("Please wait until the server generates a valid cryptographic key!");
                return;
            }
            
            // Modern copy rule
            navigator.clipboard.writeText(generatedKey).then(() => {
                alert("SUCCESS: Key encrypted & copied to clipboard! Paste it inside your application layout.");
            }).catch(err => {
                // Alternate option agar browser block kare
                alert("Your Key: " + generatedKey);
            });
        }

        // Run functions immediately
        fetchKey();
    </script>
</body>
</html>
